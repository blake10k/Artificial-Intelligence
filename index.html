<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Lab Academy - AI Terminology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Favicon: Blue rounded square with 3 white barchart lines -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23007FFF'/><rect x='20' y='50' width='12' height='30' rx='6' fill='white'/><rect x='44' y='30' width='12' height='50' rx='6' fill='white'/><rect x='68' y='15' width='12' height='65' rx='6' fill='white'/></svg>">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; /* zinc-950 */
            color: #e2e8f0; /* slate-200 */
            overflow: hidden; /* Prevent body scroll, handle inside containers */
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #dc2626; }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Option Button States */
        .option-btn {
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.05);
            transform: translateY(-2px);
        }
        .option-btn.correct {
            border-color: #22c55e;
            background-color: rgba(34, 197, 94, 0.1);
            color: #4ade80;
        }
        .option-btn.incorrect {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            color: #f87171;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Loading Bar */
        .progress-bar-fill {
            transition: width 0.5s ease-out;
        }
    </style>
</head>
<body class="flex h-screen w-full antialiased selection:bg-red-500/30">

    <!-- LEFT SIDEBAR -->
    <div class="w-80 bg-[#0c0c0e] border-r border-slate-800/50 flex-col h-full flex-shrink-0 z-10 hidden md:flex shadow-[4px_0_24px_rgba(0,0,0,0.2)]">
        <!-- Profile & Overall Progress -->
        <div class="p-8 border-b border-slate-800/50 bg-gradient-to-b from-[#111115] to-[#0c0c0e]">
            <div class="flex items-center gap-5 mb-6">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-red-600 to-red-400 flex items-center justify-center shadow-[0_0_20px_rgba(239,68,68,0.25)] border border-red-400/20 transform hover:scale-105 transition-transform duration-300 cursor-pointer" onclick="app.goHome()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#450a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>
                </div>
                <div>
                    <h2 class="font-bold text-slate-100 text-lg tracking-tight">Data Lab Academy</h2>
                    <div class="text-xs text-red-400 font-semibold tracking-wider mt-0.5" id="level-display">Level 1</div>
                </div>
            </div>
            <div class="space-y-2">
                <div class="flex justify-between text-xs mb-1">
                    <span class="text-slate-400 font-medium tracking-wide">Course Progress</span>
                    <span class="text-red-400 font-mono font-bold" id="total-progress-text">0%</span>
                </div>
                <div class="w-full bg-slate-800/60 rounded-full h-2 overflow-hidden shadow-inner">
                    <div id="total-progress-bar" class="bg-gradient-to-r from-red-600 to-red-400 h-full progress-bar-fill relative" style="width: 0%">
                        <div class="absolute top-0 right-0 bottom-0 w-4 bg-white/30 blur-[2px] rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Module List -->
        <div class="p-6 flex-1 overflow-y-auto">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-5 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> 
                Training Modules
            </h3>
            <div class="space-y-2.5" id="module-list-container">
                <!-- Modules injected by JS -->
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 flex flex-col h-full relative bg-[#09090b]">
        
        <!-- Top Navigation -->
        <div class="h-16 border-b border-slate-800/60 bg-[#0c0c0e]/80 backdrop-blur-xl flex items-center px-4 md:px-8 gap-6 shrink-0 z-20 sticky top-0">
            <button onclick="app.goHome()" id="nav-home-btn" class="h-full flex items-center gap-2.5 border-b-2 px-2 transition-all duration-300 border-red-500 text-red-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span class="font-semibold tracking-wide text-sm">Home</span>
            </button>
            <div id="nav-game-title" class="hidden text-slate-400 text-sm font-medium border-l border-slate-700 pl-6 flex items-center gap-2">
                <!-- Dynamic title -->
            </div>
        </div>

        <!-- Content Container -->
        <div class="flex-1 overflow-y-auto relative scroll-smooth p-4 md:p-8" id="main-content">
            <!-- Home or Game view injected here -->
        </div>
    </div>

    <script>
        // --- DATA CURRICULUM ---
        const MODULES = [
            {
                id: 1,
                title: "Module 1: Core AI Concepts",
                topic: "AI Terminology",
                desc: "Learn the foundational terms of Artificial Intelligence.",
                questions: [
                    {
                        task: "Identify the concept:",
                        text: "Systems designed to perform tasks that normally require human intelligence.",
                        options: ["Machine Learning", "Generative AI", "Deep Learning", "Artificial Intelligence (AI)"],
                        answer: 3
                    },
                    {
                        task: "Identify the concept:",
                        text: "Algorithms that learn patterns from data.",
                        options: ["Machine Learning (ML)", "Neural Network", "Transfer Learning", "Inference"],
                        answer: 0
                    },
                    {
                        task: "Identify the concept:",
                        text: "ML using multi-layer neural networks.",
                        options: ["Deep Learning", "Supervised Learning", "Reinforcement Learning", "Epoch"],
                        answer: 0
                    },
                    {
                        task: "Identify the concept:",
                        text: "A model inspired by the human brain’s interconnected neurons.",
                        options: ["Dataset", "Generative AI", "Neural Network", "Transformer"],
                        answer: 2
                    },
                    {
                        task: "Identify the concept:",
                        text: "AI systems that create text, images, audio, code, or video.",
                        options: ["Generative AI", "Computer Vision", "Unsupervised Learning", "Alignment"],
                        answer: 0
                    }
                ]
            },
            {
                id: 2,
                title: "Module 2: Learning Types",
                topic: "AI Terminology",
                desc: "Understand how AI models are trained.",
                questions: [
                    {
                        task: "Match the definition to the learning type:",
                        text: "Training with labeled data.",
                        options: ["Unsupervised Learning", "Supervised Learning", "Reinforcement Learning", "Transfer Learning"],
                        answer: 1
                    },
                    {
                        task: "Match the definition to the learning type:",
                        text: "Finding patterns without labels.",
                        options: ["Transfer Learning", "Reinforcement Learning", "Supervised Learning", "Unsupervised Learning"],
                        answer: 3
                    },
                    {
                        task: "Match the definition to the learning type:",
                        text: "Learning through rewards and penalties.",
                        options: ["Reinforcement Learning", "Unsupervised Learning", "Supervised Learning", "Transfer Learning"],
                        answer: 0
                    },
                    {
                        task: "Match the definition to the learning type:",
                        text: "Reusing knowledge from one task for another.",
                        options: ["Supervised Learning", "Transfer Learning", "Unsupervised Learning", "Reinforcement Learning"],
                        answer: 1
                    }
                ]
            },
            {
                id: 3,
                title: "Module 3: Data & Training Terms",
                topic: "AI Terminology",
                desc: "Master the vocabulary of datasets and training loops.",
                questions: [
                    {
                        task: "Which term fits best?",
                        text: "Collection of data used for training/testing.",
                        options: ["Feature", "Label", "Dataset", "Batch Size"],
                        answer: 2
                    },
                    {
                        task: "Which term fits best?",
                        text: "An input variable used for prediction.",
                        options: ["Label", "Feature", "Epoch", "Validation Set"],
                        answer: 1
                    },
                    {
                        task: "Which term fits best?",
                        text: "Correct output/answer in supervised learning.",
                        options: ["Feature", "Test Set", "Training Data", "Label"],
                        answer: 3
                    },
                    {
                        task: "Which term fits best?",
                        text: "One complete pass through the training data.",
                        options: ["Epoch", "Batch Size", "Iteration", "Inference"],
                        answer: 0
                    },
                    {
                        task: "Which term fits best?",
                        text: "Number of samples processed at once.",
                        options: ["Epoch", "Dataset", "Batch Size", "Context Window"],
                        answer: 2
                    }
                ]
            },
            {
                id: 4,
                title: "Module 4: Model Performance",
                topic: "AI Terminology",
                desc: "Learn how to evaluate if an AI model is actually good.",
                questions: [
                    {
                        task: "Evaluation Metric:",
                        text: "Percentage of correct predictions.",
                        options: ["Precision", "Recall", "Accuracy", "F1 Score"],
                        answer: 2
                    },
                    {
                        task: "Evaluation Metric:",
                        text: "How many predicted positives are correct.",
                        options: ["Accuracy", "Precision", "Recall", "Bias"],
                        answer: 1
                    },
                    {
                        task: "Evaluation Metric:",
                        text: "How many actual positives are identified.",
                        options: ["Precision", "Accuracy", "Variance", "Recall"],
                        answer: 3
                    },
                    {
                        task: "Model Error State:",
                        text: "Model memorizes training data too closely.",
                        options: ["Underfitting", "Bias", "Overfitting", "Variance"],
                        answer: 2
                    },
                    {
                        task: "Model Error State:",
                        text: "Error due to simplistic assumptions.",
                        options: ["Variance", "Bias", "Overfitting", "Underfitting"],
                        answer: 1
                    }
                ]
            },
            {
                id: 5,
                title: "Module 5: Modern AI / LLMs",
                topic: "AI Terminology",
                desc: "Dive into the language of modern Generative AI.",
                questions: [
                    {
                        task: "Identify the LLM concept:",
                        text: "AI models trained on massive text datasets.",
                        options: ["Token", "Large Language Model (LLM)", "Embedding", "Inference"],
                        answer: 1
                    },
                    {
                        task: "Identify the LLM concept:",
                        text: "Small unit of text processed by models.",
                        options: ["Prompt", "Context Window", "Token", "Embedding"],
                        answer: 2
                    },
                    {
                        task: "Identify the LLM concept:",
                        text: "Maximum text an AI can consider at once.",
                        options: ["Token", "Context Window", "Epoch", "Batch Size"],
                        answer: 1
                    },
                    {
                        task: "Identify the LLM concept:",
                        text: "When AI generates incorrect or fabricated information.",
                        options: ["Bias", "Variance", "Hallucination", "Underfitting"],
                        answer: 2
                    },
                    {
                        task: "Identify the LLM concept:",
                        text: "Numerical representation of text/data.",
                        options: ["Embedding", "Token", "Inference", "Fine-tuning"],
                        answer: 0
                    }
                ]
            },
            {
                id: 6,
                title: "Module 6: Architectures & Ethics",
                topic: "AI Terminology",
                desc: "Final module: Model structures, safety, and use cases.",
                questions: [
                    {
                        task: "AI Architecture:",
                        text: "Architecture powering most modern LLMs.",
                        options: ["CNN", "RNN", "Transformer", "Attention Mechanism"],
                        answer: 2
                    },
                    {
                        task: "AI Architecture:",
                        text: "Often used for analyzing images.",
                        options: ["RNN", "Transformer", "CNN (Convolutional Neural Network)", "LLM"],
                        answer: 2
                    },
                    {
                        task: "Ethics & Safety:",
                        text: "Understanding how AI makes decisions.",
                        options: ["Alignment", "Fairness", "Transparency", "Explainability"],
                        answer: 3
                    },
                    {
                        task: "Ethics & Safety:",
                        text: "Ensuring AI goals match human intentions.",
                        options: ["Alignment", "Explainability", "Safety", "Fairness"],
                        answer: 0
                    },
                    {
                        task: "AI Application:",
                        text: "AI understanding human language.",
                        options: ["Computer Vision", "Speech Recognition", "Recommendation Systems", "Natural Language Processing (NLP)"],
                        answer: 3
                    }
                ]
            }
        ];

        // --- APP STATE & LOGIC ---
        const app = {
            state: {
                view: 'home', // 'home' | 'game'
                activeModuleId: null,
                currentQIndex: 0,
                attempts: 0,
                maxAttempts: 3,
                completedModules: [],
                xp: 0
            },
            
            init() {
                this.renderSidebar();
                this.goHome();
                this.updateOverallProgress();
            },

            renderSidebar() {
                const container = document.getElementById('module-list-container');
                container.innerHTML = '';

                MODULES.forEach(mod => {
                    const isCompleted = this.state.completedModules.includes(mod.id);
                    const isActive = this.state.activeModuleId === mod.id && this.state.view === 'game';
                    
                    const el = document.createElement('div');
                    el.className = `p-3 rounded-2xl border transition-all duration-300 cursor-pointer ${
                        isActive 
                            ? 'bg-red-500/10 border-red-500/30 shadow-[0_4px_20px_rgba(239,68,68,0.05)]' 
                            : 'bg-slate-900/40 border-slate-800/60 hover:bg-slate-800/50 hover:border-slate-700/50'
                    }`;
                    
                    el.onclick = () => this.launchModule(mod.id);

                    el.innerHTML = `
                        <div class="flex items-center gap-3.5">
                            <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 transition-colors ${isActive ? 'bg-red-500/20 text-red-400' : isCompleted ? 'bg-green-500/10 text-green-500' : 'bg-slate-800 text-slate-300'}">
                                ${isCompleted 
                                    ? `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>` 
                                    : `<span class="text-sm font-bold">${mod.id}</span>`
                                }
                            </div>
                            <div>
                                <div class="text-sm font-semibold tracking-tight ${isActive ? 'text-slate-100' : 'text-slate-300'}">${mod.title.split(': ')[1] || mod.title}</div>
                                <div class="text-[11px] mt-0.5 font-medium ${isActive ? 'text-red-400/80' : 'text-slate-500'}">${mod.topic}</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(el);
                });
            },

            updateOverallProgress() {
                const pct = Math.round((this.state.completedModules.length / MODULES.length) * 100);
                document.getElementById('total-progress-text').innerText = `${pct}%`;
                document.getElementById('total-progress-bar').style.width = `${pct}%`;
                
                // Calculate level based on completed modules (every 2 modules = 1 level)
                const level = Math.floor(this.state.completedModules.length / 2) + 1;
                document.getElementById('level-display').innerText = `Level ${level}`;
            },

            goHome() {
                this.state.view = 'home';
                this.state.activeModuleId = null;
                
                // Update Nav
                document.getElementById('nav-home-btn').classList.add('border-red-500', 'text-red-400');
                document.getElementById('nav-home-btn').classList.remove('border-transparent', 'text-slate-400');
                document.getElementById('nav-game-title').classList.add('hidden');
                
                this.renderSidebar();

                const content = document.getElementById('main-content');
                
                // Find next logical module to launch
                let nextModId = 1;
                for(let m of MODULES) {
                    if(!this.state.completedModules.includes(m.id)) {
                        nextModId = m.id;
                        break;
                    }
                }

                content.innerHTML = `
                    <div class="max-w-4xl mx-auto fade-in mt-4 md:mt-10">
                        <div class="bg-[#0f1115] border border-slate-800/60 rounded-[2rem] p-8 md:p-14 shadow-2xl relative overflow-hidden">
                            <!-- Background flair -->
                            <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-red-600/10 rounded-full blur-[100px] -mr-48 -mt-48 pointer-events-none"></div>
                            
                            <div class="flex items-center gap-3 text-red-400 mb-8 relative z-10">
                                <div class="p-2 bg-red-500/10 rounded-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
                                </div>
                                <h2 class="text-xs font-bold tracking-widest uppercase">Platform Overview</h2>
                            </div>

                            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-100 mb-6 leading-tight tracking-tight relative z-10">
                                Welcome to <br/>
                                <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-red-300">Data Lab Academy</span>
                            </h1>

                            <p class="text-slate-400 text-lg leading-relaxed mb-12 max-w-2xl relative z-10">
                                Master Artificial Intelligence terminology through interactive modules. Build your vocabulary and understanding of core concepts, architectures, and performance metrics to level up your researcher status.
                            </p>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-14 relative z-10">
                                <div class="bg-slate-900/40 border border-slate-800/60 p-6 rounded-3xl">
                                    <h3 class="text-slate-200 font-bold mb-3 flex items-center gap-3">
                                        <div class="p-2 bg-slate-800 rounded-lg text-red-400"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>
                                        Progressive Learning
                                    </h3>
                                    <p class="text-sm text-slate-400 leading-relaxed">Complete modules in any order. The system tracks your progress and unlocks higher levels.</p>
                                </div>
                                <div class="bg-slate-900/40 border border-slate-800/60 p-6 rounded-3xl">
                                    <h3 class="text-slate-200 font-bold mb-3 flex items-center gap-3">
                                        <div class="p-2 bg-slate-800 rounded-lg text-red-400"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></div>
                                        Interactive Challenges
                                    </h3>
                                    <p class="text-sm text-slate-400 leading-relaxed">Select the correct term based on real-world definitions. Limited attempts per question.</p>
                                </div>
                            </div>

                            <button onclick="app.launchModule(${nextModId})" class="relative z-10 bg-red-600 hover:bg-red-500 text-white font-bold py-4 px-10 rounded-2xl transition-all duration-300 flex items-center gap-2 shadow-[0_0_20px_rgba(239,68,68,0.3)] hover:shadow-[0_0_30px_rgba(239,68,68,0.5)] hover:-translate-y-1 text-lg">
                                Launch Training <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            },

            launchModule(id) {
                this.state.view = 'game';
                this.state.activeModuleId = id;
                this.state.currentQIndex = 0;
                this.state.attempts = 0;
                
                // Update Nav
                document.getElementById('nav-home-btn').classList.remove('border-red-500', 'text-red-400');
                document.getElementById('nav-home-btn').classList.add('border-transparent', 'text-slate-400');
                
                const mod = MODULES.find(m => m.id === id);
                const titleEl = document.getElementById('nav-game-title');
                titleEl.classList.remove('hidden');
                titleEl.innerHTML = `<span class="text-red-400 font-bold">${mod.title.split(':')[0]}</span><span class="text-slate-500 mx-1">/</span><span class="text-slate-300">${mod.title.split(':')[1]}</span>`;
                
                this.renderSidebar();
                this.renderGameFrame();
            },

            renderGameFrame() {
                const mod = MODULES.find(m => m.id === this.state.activeModuleId);
                const content = document.getElementById('main-content');
                
                if (this.state.currentQIndex >= mod.questions.length) {
                    this.renderModuleComplete();
                    return;
                }

                const q = mod.questions[this.state.currentQIndex];
                const progressPct = ((this.state.currentQIndex) / mod.questions.length) * 100;

                let html = `
                    <div class="max-w-3xl mx-auto fade-in mt-2 md:mt-8 pb-20">
                        
                        <!-- Header / Progress -->
                        <div class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h2 class="text-2xl font-bold text-slate-100">${mod.topic}</h2>
                                <p class="text-slate-400 text-sm mt-1">${mod.desc}</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-xs font-mono text-slate-500">Q${this.state.currentQIndex + 1}/${mod.questions.length}</span>
                                <div class="w-32 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                    <div class="h-full bg-red-500 rounded-full transition-all duration-300" style="width: ${progressPct}%"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Game Card -->
                        <div class="bg-[#131b22] border border-slate-800/80 rounded-[2rem] p-6 md:p-10 shadow-2xl relative">
                            
                            <!-- Question Area -->
                            <div class="mb-10 text-center">
                                <span class="inline-block px-3 py-1 bg-red-500/10 text-red-400 text-xs font-bold rounded-lg mb-4 border border-red-500/20 uppercase tracking-widest">${q.task}</span>
                                <h3 class="text-2xl md:text-3xl font-medium text-slate-200 leading-relaxed max-w-2xl mx-auto">"${q.text}"</h3>
                            </div>

                            <!-- Options Grid -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="options-container">
                `;

                q.options.forEach((opt, idx) => {
                    html += `
                        <button onclick="app.handleAnswer(${idx})" id="opt-${idx}" class="option-btn text-left p-5 rounded-2xl border border-slate-700 bg-[#1a232c] text-slate-300 font-medium flex items-center gap-4 relative overflow-hidden group">
                            <div class="w-8 h-8 rounded-full border-2 border-slate-600 flex items-center justify-center flex-shrink-0 text-sm font-bold text-slate-500 group-hover:border-red-400 group-hover:text-red-400 transition-colors" id="opt-icon-${idx}">${String.fromCharCode(65 + idx)}</div>
                            <span class="text-base leading-snug">${opt}</span>
                            <div class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
                        </button>
                    `;
                });

                html += `
                            </div>
                            
                            <!-- Status Bar -->
                            <div class="mt-8 pt-6 border-t border-slate-800/80 flex items-center justify-between min-h-[40px]">
                                <div id="feedback-msg" class="text-sm font-medium opacity-0 transition-opacity flex items-center gap-2"></div>
                                <div id="attempts-display" class="text-xs font-mono text-slate-500 bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-800">Attempts: ${this.state.attempts}/${this.state.maxAttempts}</div>
                            </div>
                        </div>
                    </div>
                `;

                content.innerHTML = html;
            },

            handleAnswer(selectedIdx) {
                const mod = MODULES.find(m => m.id === this.state.activeModuleId);
                const q = mod.questions[this.state.currentQIndex];
                const isCorrect = selectedIdx === q.answer;
                
                const btn = document.getElementById(`opt-${selectedIdx}`);
                const icon = document.getElementById(`opt-icon-${selectedIdx}`);
                const feedback = document.getElementById('feedback-msg');
                const attemptsDisp = document.getElementById('attempts-display');

                // Disable all buttons to prevent spam clicks
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(b => b.disabled = true);

                if (isCorrect) {
                    // Success State
                    btn.classList.add('correct');
                    icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                    icon.classList.remove('border-slate-600', 'text-slate-500', 'group-hover:border-red-400', 'group-hover:text-red-400');
                    icon.classList.add('border-green-500', 'text-green-500', 'bg-green-500/20');
                    
                    feedback.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> <span class="text-green-400">Correct!</span>`;
                    feedback.style.opacity = '1';

                    // Add XP visually (optional, simple implementation)
                    this.state.xp += 10;

                    setTimeout(() => {
                        this.state.currentQIndex++;
                        this.state.attempts = 0;
                        this.renderGameFrame();
                    }, 1200);

                } else {
                    // Fail State
                    this.state.attempts++;
                    btn.classList.add('incorrect');
                    icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
                    icon.classList.remove('border-slate-600', 'text-slate-500');
                    icon.classList.add('border-red-500', 'text-red-500', 'bg-red-500/20');
                    
                    attemptsDisp.innerText = `Attempts: ${this.state.attempts}/${this.state.maxAttempts}`;

                    if (this.state.attempts >= this.state.maxAttempts) {
                        // Max attempts reached - Auto resolve
                        feedback.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-400"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> <span class="text-red-400">Max attempts reached. Auto-advancing...</span>`;
                        feedback.style.opacity = '1';

                        // Highlight correct answer
                        const correctBtn = document.getElementById(`opt-${q.answer}`);
                        correctBtn.classList.add('correct');
                        correctBtn.classList.add('pulse-red'); // Draw attention

                        setTimeout(() => {
                            this.state.currentQIndex++;
                            this.state.attempts = 0;
                            this.renderGameFrame();
                        }, 2500);
                    } else {
                        // Just a wrong guess, allow trying again
                        feedback.innerHTML = `<span class="text-red-400">Incorrect. Try again.</span>`;
                        feedback.style.opacity = '1';
                        
                        setTimeout(() => {
                            // Re-enable OTHER buttons, keep this one disabled/marked
                            allBtns.forEach(b => {
                                if(!b.classList.contains('incorrect')) b.disabled = false;
                            });
                            feedback.style.opacity = '0';
                        }, 800);
                    }
                }
            },

            renderModuleComplete() {
                if(!this.state.completedModules.includes(this.state.activeModuleId)) {
                    this.state.completedModules.push(this.state.activeModuleId);
                    this.updateOverallProgress();
                    this.renderSidebar(); // Update checkmarks
                }

                const content = document.getElementById('main-content');
                const isAllComplete = this.state.completedModules.length === MODULES.length;
                let nextModId = this.state.activeModuleId + 1;
                
                html = `
                    <div class="max-w-2xl mx-auto mt-10 md:mt-20 fade-in">
                        <div class="bg-[#111115] border border-red-500/30 rounded-[2.5rem] p-10 text-center shadow-[0_0_50px_rgba(239,68,68,0.15)] relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-red-600 to-red-400"></div>
                            
                            <div class="w-24 h-24 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-8 relative">
                                <div class="absolute inset-0 bg-red-500/20 rounded-full animate-ping opacity-75"></div>
                                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-400 relative z-10"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
                            </div>
                            
                            <h2 class="text-3xl font-extrabold text-slate-100 mb-3 tracking-tight">${isAllComplete ? 'Academy Completed!' : 'Module Completed!'}</h2>
                            <p class="text-slate-400 mb-10 leading-relaxed text-lg max-w-md mx-auto">
                                ${isAllComplete 
                                    ? 'Congratulations! You have successfully mastered all terminology modules and are well versed in AI concepts.' 
                                    : 'Excellent work. You have successfully identified the core concepts in this section.'}
                            </p>
                            
                            <div class="bg-[#18181b] rounded-2xl p-6 mb-10 flex justify-between items-center border border-slate-800/80 shadow-inner max-w-sm mx-auto">
                                <span class="text-slate-400 font-semibold uppercase tracking-wider text-xs">Module XP Earned</span>
                                <span class="text-4xl font-black text-red-400 font-mono">+50</span>
                            </div>
                            
                            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                                <button onclick="app.goHome()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold py-3.5 px-8 rounded-2xl transition-all duration-300 border border-slate-700 flex-1 max-w-[200px] mx-auto sm:mx-0">
                                    Return Home
                                </button>
                                ${(!isAllComplete && nextModId <= MODULES.length) ? `
                                <button onclick="app.launchModule(${nextModId})" class="bg-red-600 hover:bg-red-500 text-white font-bold py-3.5 px-8 rounded-2xl transition-all duration-300 shadow-[0_0_20px_rgba(239,68,68,0.3)] hover:shadow-[0_0_30px_rgba(239,68,68,0.5)] hover:-translate-y-1 flex-1 max-w-[250px] mx-auto sm:mx-0 flex items-center justify-center gap-2">
                                    Next Module <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                                </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
                content.innerHTML = html;
            }
        };

        // Initialize application on load
        window.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
