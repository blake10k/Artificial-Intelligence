        tailwind.config = {

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #09090b;
            color: #cbd5e1;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevent body scroll, handle inside containers */
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ca8a04; }
        
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .pulse-border {
            animation: pulseBorder 2s infinite;
        }
        @keyframes pulseBorder {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }

</head>
<body class="flex h-screen w-full selection:bg-yellow-500/30">

    <div id="app" class="flex h-full w-full"></div>

    <script>
        // Data Outline based on provided prompt
        const MODULE_TITLE = "Environment Setup & Core Imports";
        
        const MODULES = [
            {
                id: 1,
                title: `Module 1: ${MODULE_TITLE}`,
                topic: "Python & Core Data Libraries",
                case: "Setting up the Environment",
                brief: `Welcome to Data Lab Academy, Researcher.\n\nBefore we can begin analyzing complex datasets and building predictive models, we must properly configure our Python environment and import the essential foundational libraries.\n\n**Your Objectives:**\n1. Import data manipulation libraries.\n2. Import statistical and modeling libraries.\n3. Import visualization libraries.\n4. Configure the environment styling.\n\nLet's get started.`,
                steps: [
                    {
                        id: "1.1",
                        type: "code",
                        instruction: "**Step 1: Data Manipulation Libraries**\n`pandas` and `numpy` are the bedrock of data manipulation in Python. Let's import them using their standard aliases.",
                        initialCode: "# Import pandas for tabular data and numpy for numerical operations\nimport pandas ____ pd\nimport numpy ____ np\n\nprint('Data libraries successfully imported!')",
                        expected: ["as", "as"],
                        solution: "# Import pandas for tabular data and numpy for numerical operations\nimport pandas as pd\nimport numpy as np\n\nprint('Data libraries successfully imported!')",
                        hints: ["Use the 'as' keyword to create an alias for a library."],
                        successMsg: "Correct! 'pd' and 'np' are the universal standards for these libraries.",
                        output: "Data libraries successfully imported!",
                        xpReward: 50
                    },
                    {
                        id: "1.2",
                        type: "code",
                        instruction: "**Step 2: Statistics & Modeling Libraries**\nTo perform hypothesis testing and build statistical models, we rely on `scipy` and `statsmodels`.",
                        initialCode: "# Import scipy.stats and statsmodels.api\nimport scipy.stats ____ stats\nimport statsmodels.____ as sm\n\nprint('Statistical libraries ready!')",
                        expected: ["as", "api"],
                        solution: "# Import scipy.stats and statsmodels.api\nimport scipy.stats as stats\nimport statsmodels.api as sm\n\nprint('Statistical libraries ready!')",
                        hints: ["Use 'as' for scipy.stats.", "For statsmodels, you want to import the 'api' module."],
                        successMsg: "Excellent! You are now equipped for statistical rigor.",
                        output: "Statistical libraries ready!",
                        xpReward: 50
                    },
                    {
                        id: "1.3",
                        type: "code",
                        instruction: "**Step 3: Visualization Libraries**\nData is best understood visually. Import the core plotting library `matplotlib.pyplot` and the statistical visualization library `seaborn`.",
                        initialCode: "# Import matplotlib and seaborn\nimport matplotlib.____ as plt\nimport seaborn as ____\n\nprint('Visualization libraries loaded!')",
                        expected: ["pyplot", "sns"],
                        solution: "# Import matplotlib and seaborn\nimport matplotlib.pyplot as plt\nimport seaborn as sns\n\nprint('Visualization libraries loaded!')",
                        hints: ["The matplotlib module used for plotting is 'pyplot'.", "The standard alias for seaborn is 'sns'."],
                        successMsg: "Great job. Seaborn builds on top of matplotlib to make beautiful charts easily.",
                        output: "Visualization libraries loaded!",
                        xpReward: 50
                    },
                    {
                        id: "1.4",
                        type: "code",
                        instruction: "**Step 4: Environment Configuration**\nLet's configure seaborn to use a professional, publication-ready aesthetic by setting its theme.",
                        initialCode: "import seaborn as sns\n\n# Set the seaborn theme to 'whitegrid' for cleaner plots\nsns.____(style='____')\n\nprint('Environment themed and ready!')",
                        expected: ["set_theme", "whitegrid"],
                        solution: "import seaborn as sns\n\n# Set the seaborn theme to 'whitegrid' for cleaner plots\nsns.set_theme(style='whitegrid')\n\nprint('Environment themed and ready!')",
                        hints: ["The function to set the theme is 'set_theme()'.", "The style name provided in the instructions is 'whitegrid'."],
                        successMsg: "Perfect. Your environment is now fully configured.",
                        output: "Environment themed and ready!",
                        xpReward: 75
                    },
                    {
                        id: "1.5",
                        type: "code",
                        instruction: "**Step 5: Comprehensive Setup**\nNow, write a clean, combined setup script. Import `pandas`, `numpy`, `matplotlib.pyplot`, and `seaborn`. Then set the seaborn theme to `whitegrid`.",
                        initialCode: "# Import data libraries\n____ pandas as pd\nimport numpy as np\n\n# Import viz libraries\nimport matplotlib.pyplot as plt\nimport seaborn as sns\n\n# Set theme\nsns.____(____='whitegrid')\n\nprint('Full Environment Successfully Configured!')",
                        expected: ["import", "set_theme", "style"],
                        solution: "# Import data libraries\nimport pandas as pd\nimport numpy as np\n\n# Import viz libraries\nimport matplotlib.pyplot as plt\nimport seaborn as sns\n\n# Set theme\nsns.set_theme(style='whitegrid')\n\nprint('Full Environment Successfully Configured!')",
                        hints: ["Start with the 'import' keyword for pandas.", "Use 'set_theme' and pass the argument 'style'."],
                        successMsg: "Module Complete! You have successfully established your data science environment.",
                        output: "Full Environment Successfully Configured!",
                        xpReward: 100
                    }
                ]
            }
        ];

        // Application State
        let state = {
            xp: 0,
            level: 1,
            activeTab: 'home', // 'home' or 'codelab'
            activeModuleId: 1,
            unlockedModules: [1],
            completedSteps: [],
            currentStepId: MODULES[0].steps[0].id,
            codeInputs: { [MODULES[0].steps[0].id]: MODULES[0].steps[0].initialCode },
            hintIndices: {},
            stepFeedback: {},
            attempts: {}, // Track attempts per step (Max 3)
            showCompleteModal: false
        };

        // Helpers
        const getModule = (id) => MODULES.find(m => m.id === id);
        const getStep = (id) => {
            for (let m of MODULES) {
                let step = m.steps.find(s => s.id === id);
                if (step) return step;
            }
            return null;
        };
        const getNextStep = (stepId) => {
            const mod = getModule(state.activeModuleId);
            const idx = mod.steps.findIndex(s => s.id === stepId);
            if (idx >= 0 && idx < mod.steps.length - 1) {
                return mod.steps[idx + 1];
            }
            return null;
        };

        const formatText = (text) => {
            const parts = text.split(/(\*\*.*?\*\*|\n)/g);
            return parts.map(part => {
                if (part === '\n') return '<br />';
                if (part.startsWith('**') && part.endsWith('**')) {
                    return `<strong class="text-yellow-400 font-semibold">${part.slice(2, -2)}</strong>`;
                }
                return part;
            }).join('');
        };

        const normalizeCode = (s) => s.replace(/['"]/g, "'").replace(/\s+/g, '').toLowerCase();

        // Render Functions
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = `
                ${renderSidebar()}
                <div class="flex-1 flex flex-col h-full relative bg-[#09090b]">
                    ${renderTopNav()}
                    <div class="flex-1 overflow-y-auto relative scroll-smooth bg-[#09090b] px-4 md:px-0" id="main-content">
                        ${state.activeTab === 'home' ? renderHome() : renderCodeLab()}
                        <div id="bottom-anchor" class="h-10"></div>
                    </div>
                </div>
                ${state.showCompleteModal ? renderCompleteModal() : ''}
            `;
            
            // Re-attach textarea values manually to prevent cursor jumping if re-rendered while typing
            // Note: In a vanilla JS app without diffing, a full re-render resets focus. 
            // We manage this by only re-rendering on specific actions (button clicks), not on 'input'.
        }

        function renderSidebar() {
            const courseProgressPercent = Math.round((MODULES.filter(mod => mod.steps.every(step => state.completedSteps.includes(step.id))).length / MODULES.length) * 100);

            return `
            <div class="w-80 bg-[#0c0c0e] border-r border-slate-800/50 flex-col h-full flex-shrink-0 z-10 hidden md:flex shadow-[4px_0_24px_rgba(0,0,0,0.2)]">
                <div class="p-8 border-b border-slate-800/50 bg-gradient-to-b from-[#111115] to-[#0c0c0e]">
                    <div class="flex items-center gap-5 mb-6">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-yellow-500 to-yellow-300 flex items-center justify-center shadow-[0_0_20px_rgba(234,179,8,0.25)] border border-yellow-400/20 transform hover:scale-105 transition-transform duration-300">
                            <i class="fa-solid fa-gamepad text-yellow-950 text-2xl"></i>
                        </div>
                        <div>
                            <h2 class="font-bold text-slate-100 text-lg tracking-tight">Researcher</h2>
                            <div class="text-xs text-yellow-400 font-semibold tracking-wider uppercase mt-0.5">Level ${state.level}</div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-slate-400 font-medium tracking-wide">Course Progress</span>
                            <span class="text-yellow-400 font-mono font-bold">${courseProgressPercent}%</span>
                        </div>
                        <div class="w-full bg-slate-800/60 rounded-full h-2 overflow-hidden shadow-inner">
                            <div class="bg-gradient-to-r from-yellow-500 to-yellow-300 h-full transition-all duration-1000 ease-out relative" style="width: ${courseProgressPercent}%">
                                <div class="absolute top-0 right-0 bottom-0 w-4 bg-white/30 blur-[2px] rounded-full"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="p-6 flex-1 overflow-y-auto">
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-5 flex items-center gap-2">
                        <i class="fa-regular fa-file-code"></i> Training Modules
                    </h3>
                    <div class="space-y-2.5">
                        ${MODULES.map(mod => {
                            const isUnlocked = state.unlockedModules.includes(mod.id);
                            const isActive = state.activeModuleId === mod.id;
                            return `
                                <div onclick="handleSwitchModule(${mod.id}, ${isUnlocked})" 
                                    class="p-3 rounded-2xl border transition-all duration-300 ${isActive ? 'bg-yellow-500/10 border-yellow-500/30 shadow-[0_4px_20px_rgba(234,179,8,0.05)] cursor-pointer' : isUnlocked ? 'bg-slate-900/40 border-slate-800/60 cursor-pointer hover:bg-slate-800/50 hover:border-slate-700/50' : 'bg-transparent border-transparent opacity-30 cursor-not-allowed'}">
                                    <div class="flex items-center gap-3.5">
                                        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 transition-colors ${isActive ? 'bg-yellow-500/20 text-yellow-400' : isUnlocked ? 'bg-slate-800 text-slate-300' : 'bg-slate-800/50 text-slate-600'}">
                                            ${isUnlocked ? `<span class="text-sm font-bold">${mod.id}</span>` : `<i class="fa-solid fa-lock text-xs"></i>`}
                                        </div>
                                        <div>
                                            <div class="text-sm font-semibold tracking-tight ${isActive ? 'text-slate-100' : isUnlocked ? 'text-slate-300' : 'text-slate-500'}">${mod.title.split(': ')[1]}</div>
                                            <div class="text-[11px] mt-0.5 font-medium ${isActive ? 'text-yellow-400/80' : 'text-slate-500'}">${mod.topic}</div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            </div>`;
        }

        function renderTopNav() {
            // Per instructions: Top right ONLY home button. 
            // Top left: Controller Icon, Data Lab Academy (white), Theme colored module text below it.
            return `
            <div class="h-20 border-b border-slate-800/60 bg-[#0c0c0e]/80 backdrop-blur-xl flex items-center justify-between px-4 md:px-8 shrink-0 z-20 sticky top-0">
                <div class="flex items-center gap-4 cursor-pointer" onclick="handleGoHome()">
                    <div class="p-2 bg-yellow-500/10 rounded-lg text-yellow-500 hover:bg-yellow-500/20 transition-colors">
                        <i class="fa-solid fa-gamepad text-2xl"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-white font-bold text-lg tracking-wide leading-tight">Data Lab Academy</span>
                        <span class="text-yellow-400 font-semibold text-sm leading-tight">${MODULE_TITLE}</span>
                    </div>
                </div>
                
                <div class="flex items-center h-full">
                    <button onclick="handleGoHome()" class="h-full flex items-center gap-2.5 border-b-2 px-4 transition-all duration-300 ${state.activeTab === 'home' ? 'border-yellow-500 text-yellow-400' : 'border-transparent text-slate-400 hover:text-slate-200'}">
                        <i class="fa-solid fa-house text-lg"></i> <span class="font-semibold tracking-wide text-sm">Home</span>
                    </button>
                </div>
            </div>`;
        }

        function renderHome() {
            const activeModuleData = getModule(state.activeModuleId);
            return `
            <div class="py-8 md:py-16 max-w-4xl mx-auto fade-in">
                <div class="bg-[#0f1115] border border-slate-800/60 rounded-[2rem] p-8 md:p-14 shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-yellow-500/10 rounded-full blur-[100px] -mr-48 -mt-48 pointer-events-none transition-all duration-1000"></div>
                    
                    <div class="flex flex-col items-center justify-center text-yellow-400 mb-8 relative z-10">
                        <div class="mb-3 transform hover:scale-110 transition-transform duration-300 text-5xl">
                            <i class="fa-solid fa-graduation-cap"></i>
                        </div>
                        <h2 class="text-sm font-bold tracking-widest uppercase text-yellow-400 text-center">${MODULE_TITLE}</h2>
                    </div>

                    <h1 class="text-4xl md:text-5xl font-extrabold text-slate-100 mb-6 leading-tight tracking-tight relative z-10 text-center">
                        Welcome to <br/>
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-200">Data Lab Academy</span>
                    </h1>

                    <p class="text-slate-400 text-lg leading-relaxed mb-12 max-w-2xl mx-auto text-center relative z-10">
                        Data Lab Academy is an immersive, browser-based interactive learning platform designed to take you from Python beginner to data analysis expert through hands-on, realistic data challenges.
                    </p>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-14 relative z-10">
                        <div class="bg-slate-900/40 border border-slate-800/60 p-6 rounded-3xl hover:bg-slate-800/40 hover:border-yellow-500/30 transition-all duration-300 group hover:-translate-y-1">
                            <h3 class="text-slate-200 font-bold mb-3 flex items-center gap-3">
                                <div class="p-2 bg-slate-800 rounded-lg group-hover:bg-yellow-500/10 transition-colors">
                                    <i class="fa-solid fa-terminal text-yellow-400"></i>
                                </div>
                                Interactive Coding
                            </h3>
                            <p class="text-sm text-slate-400 leading-relaxed">Write real Python code in our notebook-style editor with instant validation.</p>
                        </div>
                        <div class="bg-slate-900/40 border border-slate-800/60 p-6 rounded-3xl hover:bg-slate-800/40 hover:border-yellow-500/30 transition-all duration-300 group hover:-translate-y-1">
                            <h3 class="text-slate-200 font-bold mb-3 flex items-center gap-3">
                                <div class="p-2 bg-slate-800 rounded-lg group-hover:bg-yellow-500/10 transition-colors">
                                    <i class="fa-solid fa-medal text-yellow-400"></i>
                                </div>
                                Progressive Learning
                            </h3>
                            <p class="text-sm text-slate-400 leading-relaxed">Complete modules, earn XP, and level up your researcher status.</p>
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-[#131b22] to-[#0c0c0e] border border-yellow-500/20 rounded-[2rem] p-8 md:p-10 relative z-10 shadow-[0_0_30px_rgba(234,179,8,0.05)] text-center">
                        <h3 class="text-slate-100 font-bold mb-3 flex justify-center items-center gap-3 text-xl">
                            <i class="fa-solid fa-play text-yellow-400"></i> Ready to begin?
                        </h3>
                        <p class="text-slate-400 text-base mb-8 max-w-xl mx-auto">
                            Begin your active module: <strong class="text-slate-200">${activeModuleData.title}</strong>. Jump straight into the interactive code environment to begin your analysis.
                        </p>
                        <div class="flex justify-center">
                            <button onclick="handleLaunch()" class="bg-yellow-500 hover:bg-yellow-400 text-yellow-950 font-bold py-3.5 px-10 rounded-2xl transition-all duration-300 flex items-center gap-3 shadow-[0_0_20px_rgba(234,179,8,0.25)] hover:shadow-[0_0_30px_rgba(234,179,8,0.4)] hover:-translate-y-1 text-lg">
                                Launch Code <i class="fa-solid fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function renderCodeLab() {
            const activeModuleData = getModule(state.activeModuleId);
            
            let stepsHtml = activeModuleData.steps.map(step => {
                const isCompleted = state.completedSteps.includes(step.id);
                const isActive = state.currentStepId === step.id;

                if (!isCompleted && !isActive) return '';

                const feedback = state.stepFeedback[step.id];
                const codeValue = state.codeInputs[step.id] || '';
                const lines = Math.max(codeValue.split('\n').length, 3);
                const lineNumbers = Array.from({length: lines}, (_, i) => `<div>${i+1}</div>`).join('');
                
                const currentHints = state.hintIndices[step.id] || 0;
                const attempts = state.attempts[step.id] || 0;

                let hintsHtml = '';
                if (currentHints > 0) {
                    hintsHtml = `
                    <div class="mt-5 space-y-3 fade-in">
                        ${step.hints.slice(0, currentHints).map((hint, i) => `
                            <div class="bg-[#131b22] border border-yellow-900/30 text-slate-300 px-5 py-4 rounded-2xl flex items-start gap-3.5 text-sm shadow-sm">
                                <i class="fa-regular fa-lightbulb mt-0.5 flex-shrink-0 text-yellow-500 text-lg"></i>
                                <div>
                                    <strong class="block text-yellow-400 mb-1 font-semibold">Hint ${i+1}</strong>
                                    <span class="leading-relaxed">${hint}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
                }

                let outputHtml = '';
                if (isCompleted) {
                    outputHtml = `
                    <div class="mt-6 fade-in">
                        ${feedback && feedback.type === 'success' ? `
                        <div class="mb-5 bg-yellow-500/10 border border-yellow-500/20 text-yellow-400 px-5 py-3 rounded-2xl flex items-center gap-3 text-sm font-medium">
                            <i class="fa-solid fa-circle-check text-lg flex-shrink-0"></i>
                            <span>${feedback.msg}</span>
                        </div>
                        ` : ''}
                        <div class="flex items-start gap-5">
                            <div class="text-[10px] font-mono font-bold text-rose-400/80 uppercase tracking-widest w-16 text-right pt-3 shrink-0">
                                Out [${step.id.replace('.','')}]
                            </div>
                            <div class="flex-1">
                                <div class="bg-[#0c0c0e] rounded-2xl p-5 font-mono text-[13px] text-slate-300 overflow-x-auto border border-slate-800/80 shadow-inner">
                                    <pre class="leading-loose">${step.output}</pre>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }

                let actionBarHtml = '';
                if (isActive) {
                    let btnHtml = '';
                    if (currentHints < step.hints.length) {
                        btnHtml = `
                        <button onclick="handleHint('${step.id}')" class="bg-slate-800/80 hover:bg-slate-700 text-slate-300 font-semibold py-2.5 px-5 rounded-xl transition-all duration-300 flex items-center gap-2 border border-slate-700 text-sm hover:-translate-y-0.5">
                            <i class="fa-regular fa-lightbulb"></i> Get Hint
                        </button>`;
                    } else {
                        btnHtml = `
                        <button onclick="handleAnswer('${step.id}')" class="bg-yellow-900/40 hover:bg-yellow-900/60 text-yellow-400 font-semibold py-2.5 px-5 rounded-xl transition-all duration-300 flex items-center gap-2 border border-yellow-700/50 text-sm hover:-translate-y-0.5">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> Fill Answer
                        </button>`;
                    }

                    actionBarHtml = `
                    <div class="mt-5 flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between fade-in">
                        <div class="flex gap-3 items-center">
                            <button onclick="handleRunCode('${step.id}')" class="bg-yellow-500 hover:bg-yellow-400 text-yellow-950 font-bold py-2.5 px-6 rounded-xl transition-all duration-300 flex items-center gap-2 shadow-[0_0_15px_rgba(234,179,8,0.25)] hover:shadow-[0_0_25px_rgba(234,179,8,0.4)] hover:-translate-y-0.5 text-sm">
                                <i class="fa-solid fa-play"></i> Run Code
                            </button>
                            ${btnHtml}
                            ${attempts > 0 ? `<span class="text-xs text-slate-500 ml-2 font-mono">Attempts: ${attempts}/3</span>` : ''}
                        </div>
                        ${feedback ? `
                        <div class="flex items-center gap-2.5 text-sm px-5 py-2.5 rounded-xl border font-medium ${feedback.type === 'error' ? 'bg-rose-950/40 text-rose-400 border-rose-900/50' : 'bg-yellow-950/40 text-yellow-400 border-yellow-900/50'} fade-in max-w-md">
                            ${feedback.type === 'error' ? '<i class="fa-solid fa-circle-xmark"></i>' : '<i class="fa-solid fa-circle-check"></i>'}
                            <span>${feedback.msg}</span>
                        </div>
                        ` : ''}
                    </div>`;
                }

                return `
                <div class="mb-14 fade-in relative group" id="step-${step.id}">
                    ${isCompleted ? `<div class="absolute left-8 top-full h-14 w-px bg-slate-800 -z-10"></div>` : ''}
                    
                    <div class="bg-transparent border-l-[3px] border-yellow-500 pl-6 py-2 mb-6 transition-all duration-300 hover:border-yellow-400">
                        <div class="text-slate-300 text-[15px] leading-relaxed">
                            ${formatText(step.instruction)}
                        </div>
                    </div>

                    <div class="rounded-2xl overflow-hidden border ${isActive ? 'border-yellow-500/40 shadow-[0_0_30px_rgba(234,179,8,0.08)]' : 'border-slate-800/80'} bg-[#1e1e1e] transition-all duration-500">
                        <div class="bg-[#18181b] px-5 py-3 flex items-center justify-between border-b border-black/40">
                            <div class="flex items-center gap-4">
                                <div class="flex gap-2">
                                    <div class="w-3 h-3 rounded-full bg-rose-500/80"></div>
                                    <div class="w-3 h-3 rounded-full bg-amber-500/80"></div>
                                    <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-mono font-medium ${isCompleted ? 'text-slate-500' : 'text-yellow-400'}">notebook.ipynb</span>
                                    ${isActive ? `<span class="inline-block w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>` : ''}
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest">
                                    In [${isCompleted ? step.id.replace('.','') : '*'}]
                                </span>
                                ${isCompleted ? `<i class="fa-solid fa-circle-check text-yellow-500"></i>` : ''}
                            </div>
                        </div>
                        
                        <div class="p-5 relative flex font-mono text-[14px] leading-loose bg-[#1e1e1e]">
                            <div class="w-8 flex-shrink-0 text-slate-600 text-right pr-4 select-none pt-0.5 opacity-50 font-mono">
                                ${lineNumbers}
                            </div>
                            <textarea
                                id="textarea-${step.id}"
                                data-step="${step.id}"
                                oninput="handleCodeInput(event)"
                                ${isCompleted ? 'disabled' : ''}
                                class="flex-1 bg-transparent text-[#d4d4d4] resize-none focus:outline-none ${isCompleted ? 'opacity-70' : ''}"
                                rows="${lines}"
                                spellcheck="false"
                                wrap="off"
                            >${codeValue}</textarea>
                        </div>
                    </div>
                    
                    ${actionBarHtml}
                    ${hintsHtml}
                    ${outputHtml}
                </div>`;
            }).join('');

            return `
            <div class="py-8 md:py-16 max-w-4xl mx-auto pb-40">
                <div class="mb-12 flex items-center justify-between bg-yellow-500/5 border border-yellow-500/10 p-5 rounded-3xl">
                    <h2 class="text-xl font-bold text-slate-100 flex items-center gap-3">
                        <i class="fa-solid fa-terminal text-yellow-400"></i> Interactive Notebook
                    </h2>
                    <span class="text-xs text-slate-400 font-mono bg-slate-900 px-3 py-1.5 rounded-full border border-slate-800">Kernel: Python 3.10</span>
                </div>
                
                ${stepsHtml}
            </div>`;
        }

        function renderCompleteModal() {
            return `
            <div class="fixed inset-0 bg-[#09090b]/90 backdrop-blur-md flex items-center justify-center z-50 fade-in px-4">
                <div class="bg-[#0f1115] border border-yellow-500/30 rounded-[2.5rem] p-10 max-w-md w-full text-center shadow-[0_0_50px_rgba(234,179,8,0.15)] relative overflow-hidden transform transition-all">
                    <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-500 hover:text-slate-300 transition-colors" title="Close and review code">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                    </button>
                    <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-yellow-500 to-yellow-300"></div>
                    
                    <div class="w-24 h-24 bg-yellow-500/10 rounded-full flex items-center justify-center mx-auto mb-8 relative">
                        <div class="absolute inset-0 bg-yellow-500/20 rounded-full animate-ping opacity-75"></div>
                        <i class="fa-solid fa-award text-5xl text-yellow-400 relative z-10"></i>
                    </div>
                    
                    <h2 class="text-3xl font-extrabold text-slate-100 mb-3 tracking-tight">Academy Completed!</h2>
                    <p class="text-slate-400 mb-10 leading-relaxed">Congratulations! You have successfully mastered the Environment Setup & Core Imports module and are ready for the next challenge.</p>
                    
                    <div class="bg-[#131b22] rounded-2xl p-6 mb-10 flex justify-between items-center border border-slate-800/80 shadow-inner">
                        <span class="text-slate-400 font-semibold uppercase tracking-wider text-xs">Total XP Earned</span>
                        <span class="text-4xl font-black text-yellow-400 font-mono">${state.xp}</span>
                    </div>
                    
                    <button onclick="handleGoHome()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-yellow-950 font-bold py-4 rounded-2xl transition-all duration-300 shadow-[0_0_20px_rgba(234,179,8,0.3)] hover:shadow-[0_0_30px_rgba(234,179,8,0.5)] flex items-center justify-center gap-2 hover:-translate-y-1">
                        Return to Home <i class="fa-solid fa-house ml-1"></i>
                    </button>
                </div>
            </div>`;
        }

        // Event Handlers
        window.handleGoHome = () => {
            state.activeTab = 'home';
            state.showCompleteModal = false;
            render();
        };

        window.handleLaunch = () => {
            state.activeTab = 'codelab';
            const mod = getModule(state.activeModuleId);
            const firstUncompleted = mod.steps.find(s => !state.completedSteps.includes(s.id));
            const stepToActivate = firstUncompleted || mod.steps[mod.steps.length - 1];
            
            state.currentStepId = stepToActivate.id;
            if (!state.codeInputs[stepToActivate.id] && !state.completedSteps.includes(stepToActivate.id)) {
                state.codeInputs[stepToActivate.id] = stepToActivate.initialCode;
            }
            render();
            scrollToBottom();
        };

        window.handleSwitchModule = (moduleId, isUnlocked) => {
            if (!isUnlocked) return;
            state.activeModuleId = moduleId;
            handleLaunch();
        };

        window.handleCodeInput = (e) => {
            const stepId = e.target.dataset.step;
            state.codeInputs[stepId] = e.target.value;
            // Clear error feedback on type
            if (state.stepFeedback[stepId] && state.stepFeedback[stepId].type === 'error') {
                delete state.stepFeedback[stepId];
                render();
            }
            // Auto resize text area logic is baked into the render rows assignment, 
            // but for immediate typing feedback without full re-render:
            const lines = Math.max(e.target.value.split('\n').length, 3);
            e.target.rows = lines;
            const lineNumbersDiv = e.target.previousElementSibling;
            lineNumbersDiv.innerHTML = Array.from({length: lines}, (_, i) => `<div>${i+1}</div>`).join('');
        };

        window.handleRunCode = (stepId) => {
            const step = getStep(stepId);
            const input = state.codeInputs[stepId] || '';
            
            if (input.includes("____")) {
                state.stepFeedback[stepId] = { type: "error", msg: "Please fill in all the blanks (____) before running." };
                render();
                return;
            }

            const normalizedInput = normalizeCode(input);
            let passed = true;
            for (const exp of step.expected) {
                if (!normalizedInput.includes(normalizeCode(exp))) {
                    passed = false;
                    break;
                }
            }

            if (passed) {
                handleSuccess(stepId, step.successMsg);
            } else {
                state.attempts[stepId] = (state.attempts[stepId] || 0) + 1;
                if (state.attempts[stepId] >= 3) {
                    // Auto-answer after 3 failed attempts
                    state.codeInputs[stepId] = step.solution;
                    state.stepFeedback[stepId] = { type: "success", msg: "Maximum attempts reached. Highlighting correct answer..." };
                    render();
                    setTimeout(() => handleSuccess(stepId, step.successMsg, true), 2000);
                } else {
                    state.stepFeedback[stepId] = { type: "error", msg: `Incorrect logic/syntax. Attempt ${state.attempts[stepId]}/3.` };
                    render();
                }
            }
        };

        window.handleHint = (stepId) => {
            const step = getStep(stepId);
            const currentHints = state.hintIndices[stepId] || 0;
            if (currentHints < step.hints.length) {
                state.hintIndices[stepId] = currentHints + 1;
                state.xp = Math.max(0, state.xp - 5);
                render();
                scrollToBottom();
            }
        };

        window.handleAnswer = (stepId) => {
            const step = getStep(stepId);
            state.codeInputs[stepId] = step.solution;
            state.stepFeedback[stepId] = { type: "success", msg: "Solution filled! Auto-running..." };
            state.xp = Math.max(0, state.xp - 15);
            render();
            setTimeout(() => handleSuccess(stepId, step.successMsg, true), 2000);
        };

        function handleSuccess(stepId, msg, skipPause = false) {
            const step = getStep(stepId);
            state.stepFeedback[stepId] = { type: "success", msg: msg };
            
            if (!state.completedSteps.includes(stepId)) {
                state.completedSteps.push(stepId);
                state.xp += step.xpReward;
                
                const nextStep = getNextStep(stepId);
                
                setTimeout(() => {
                    if (nextStep) {
                        state.currentStepId = nextStep.id;
                        if (!state.codeInputs[nextStep.id]) {
                            state.codeInputs[nextStep.id] = nextStep.initialCode;
                        }
                        render();
                        scrollToBottom();
                    } else {
                        // Module Complete
                        setTimeout(() => {
                            state.showCompleteModal = true;
                            render();
                        }, 500);
                    }
                }, skipPause ? 0 : 2000);
                
                // Immediately render success state before pause
                render();
            } else {
                // If already completed, just show success msg
                render();
            }
        }

        window.closeModal = () => {
            state.showCompleteModal = false;
            render();
        }

        function scrollToBottom() {
            setTimeout(() => {
                const anchor = document.getElementById('bottom-anchor');
                if (anchor) {
                    anchor.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, 100);
        }

        // Initialize App
        render();
    </script>
</body>
</html>
